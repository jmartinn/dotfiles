# AeroSpace — tiling window manager config.
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# --- Startup ---
start-at-login = true
after-login-command = []
after-startup-command = []

# --- Behavior ---
automatically-unhide-macos-hidden-apps = false

# Keep the mouse with the focus, across windows and monitors.
on-focus-changed = ['move-mouse window-lazy-center']
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# --- Layout ---
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 30

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 10
    inner.vertical   = 10
    outer.left       = 15
    outer.right      = 15
    outer.top        = 15
    outer.bottom     = 15

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab
# All possible modifiers: cmd, alt, ctrl, shift
[mode.main.binding]

    # --- Launch ---
    alt-enter = 'exec-and-forget open -n /Applications/Ghostty.app'

    # --- Layout ---
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    # --- Focus ---
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # --- Move window within workspace ---
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # --- Resize ---
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # --- Switch workspace ---
    # Numbers: terminal / browser / scratch.  Letters: app-pinned (see on-window-detected).
    alt-1 = 'workspace 1'   # terminal
    alt-2 = 'workspace 2'   # browser
    alt-3 = 'workspace 3'   # scratch
    alt-a = 'workspace A'   # AI
    alt-b = 'workspace B'   # database
    alt-c = 'workspace C'   # code (Cursor)
    alt-d = 'workspace D'   # Discord
    alt-m = 'workspace M'   # mail
    alt-n = 'workspace N'   # notes
    alt-o = 'workspace O'   # OBS
    alt-p = 'workspace P'   # preview
    alt-t = 'workspace T'   # Telegram
    alt-v = 'workspace V'   # VS Code

    # --- Move focused window to workspace ---
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-a = 'move-node-to-workspace A'
    alt-shift-b = 'move-node-to-workspace B'
    alt-shift-c = 'move-node-to-workspace C'
    alt-shift-d = 'move-node-to-workspace D'
    alt-shift-m = 'move-node-to-workspace M'
    alt-shift-n = 'move-node-to-workspace N'
    alt-shift-o = 'move-node-to-workspace O'
    alt-shift-p = 'move-node-to-workspace P'
    alt-shift-t = 'move-node-to-workspace T'
    alt-shift-v = 'move-node-to-workspace V'

    # --- Window state ---
    alt-shift-f = 'fullscreen'

    # --- Workspace navigation ---
    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # --- Service mode ---
    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc       = ['reload-config', 'mode main']
    r         = ['flatten-workspace-tree', 'mode main']        # reset layout
    f         = ['layout floating tiling', 'mode main']        # toggle floating / tiling
    backspace = ['close-all-windows-but-current', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

# --- Window auto-assignment ---
# Each app opens on its mnemonic workspace.  Layout is intentionally omitted:
# the root container defaults to 'tiles', so windows tile without forcing it.

# 1 — terminal
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

# 2 — browser
[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace 2'

# A — AI assistants
[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = 'move-node-to-workspace A'

[[on-window-detected]]
if.app-id = 'com.openai.chat'
run = 'move-node-to-workspace A'

[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = 'move-node-to-workspace A'

# B — database
[[on-window-detected]]
if.app-id = 'com.tinyapp.TablePlus'
run = 'move-node-to-workspace B'

# C — code (Cursor)
[[on-window-detected]]
if.app-id = 'com.todesktop.230313mzl4w4u92'
run = 'move-node-to-workspace C'

# D — Discord
[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace D'

# M — mail
[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = 'move-node-to-workspace M'

# N — notes (Obsidian)
[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace N'

# O — OBS
[[on-window-detected]]
if.app-id = 'com.obsproject.obs-studio'
run = 'move-node-to-workspace O'

# P — preview
[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = 'move-node-to-workspace P'

# T — Telegram
[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = 'move-node-to-workspace T'

# V — VS Code
[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace V'
