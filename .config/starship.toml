"$schema" = 'https://starship.rs/config-schema.json'

# Two-line format: all context on line 1, prompt char alone on line 2.
# Language modules and cmd_duration are conditional ÔÇö they only render in
# matching projects or after slow commands, so line 1 stays quiet otherwise.
format = """
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$bun\
$python\
$golang\
$rust\
$lua\
$php\
$java\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[character]
success_symbol = "[¤ä](bold green)"
error_symbol   = "[¤ä](bold red)"

